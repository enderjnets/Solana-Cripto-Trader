<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Volt Mobility — Front White</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 336px;   /* 88.9mm @ 96dpi */
    height: 192px;  /* 50.8mm @ 96dpi */
    background: #FFFFFF;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    position: relative;
    border: 0.5mm solid #E5E7EB;
  }

  /* Top black bar */
  .top-bar {
    width: 100%;
    height: 18px;
    background: #0A0A0F;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .company-name-top {
    font-size: 5px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: #00E5FF;
    text-transform: uppercase;
    text-align: center;
  }

  /* Main content */
  .content {
    padding: 12px 16px 10px 16px;
    position: relative;
    height: calc(100% - 18px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .name-block {
    margin-bottom: 4px;
  }

  .owner-name {
    font-size: 14px;
    font-weight: 800;
    color: #0A0A0F;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    line-height: 1.1;
  }

  .owner-title {
    font-size: 7.5px;
    color: #6B7280;
    font-weight: 400;
    letter-spacing: 0.8px;
    margin-top: 2px;
  }

  /* Cyan separator line */
  .separator {
    width: 36px;
    height: 1px;
    background: #00E5FF;
    margin: 7px 0;
  }

  /* Contact list */
  .contacts {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 2.5px;
  }

  .contacts li {
    font-size: 6.5px;
    color: #374151;
    font-weight: 400;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    gap: 4px;
    line-height: 1.3;
  }

  .bullet {
    color: #00E5FF;
    font-size: 8px;
    font-weight: 900;
    flex-shrink: 0;
    line-height: 1;
  }

  /* Watermark bolt */
  .bolt-watermark {
    position: absolute;
    bottom: 8px;
    right: 10px;
    opacity: 0.08;
    width: 32px;
    height: 32px;
  }
</style>
</head>
<body>

  <!-- Top black bar with company name -->
  <div class="top-bar">
    <span class="company-name-top">BLACK VOLT MOBILITY LLC</span>
  </div>

  <!-- Main content area -->
  <div class="content">

    <div>
      <div class="name-block">
        <div class="owner-name">Ender Ocando</div>
        <div class="owner-title">Owner &amp; Operator</div>
      </div>

      <div class="separator"></div>

      <ul class="contacts">
        <li>
          <span class="bullet">•</span>
          <span>+1 (720) 512-1753</span>
        </li>
        <li>
          <span class="bullet">•</span>
          <span>info@blackvoltmobility.com</span>
        </li>
        <li>
          <span class="bullet">•</span>
          <span>Executive Black Car Service</span>
        </li>
        <li>
          <span class="bullet">•</span>
          <span>2024 Kia EV9 &nbsp;|&nbsp; Aurora / Denver, CO</span>
        </li>
      </ul>
    </div>

    <!-- Watermark bolt SVG -->
    <svg class="bolt-watermark" viewBox="0 0 24 24" fill="#0A0A0F" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
    </svg>

  </div>

</body>
</html>
