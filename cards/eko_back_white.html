<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eko AI Automation — Back White</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 336px;
    height: 192px;
    background: #FFFFFF;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border: 0.5mm solid #E5E7EB;
  }

  /* Card-within-card: large blue centered box */
  .inner-card {
    width: 226px;  /* ~60mm */
    height: 132px; /* ~35mm */
    background: #0B4FD8;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 4px 16px rgba(11,79,216,0.20);
  }

  .inner-logo-k {
    font-size: 30px;
    font-weight: 800;
    color: #FFFFFF;
    line-height: 1;
    letter-spacing: -1px;
    font-family: 'Inter', sans-serif;
  }

  .inner-tagline {
    font-size: 7px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 0.3px;
    text-align: center;
    line-height: 1.3;
    padding: 0 12px;
  }

  /* Pills row */
  .pills-row {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .pill {
    font-size: 5.5px;
    font-weight: 600;
    color: #0B4FD8;
    border: 0.8px solid #0B4FD8;
    border-radius: 20px;
    padding: 2px 7px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    background: rgba(11,79,216,0.04);
  }

  /* Website footer */
  .website {
    font-size: 5.5px;
    color: #9CA3AF;
    font-weight: 400;
    letter-spacing: 0.8px;
    margin-top: -4px;
  }
</style>
</head>
<body>

  <!-- Inner blue card -->
  <div class="inner-card">
    <div class="inner-logo-k">K</div>
    <div class="inner-tagline">Your Business, Always Answered.</div>
  </div>

  <!-- Pills -->
  <div class="pills-row">
    <span class="pill">Voice AI</span>
    <span class="pill">Lead Capture</span>
    <span class="pill">Auto-Booking</span>
  </div>

  <!-- Website -->
  <div class="website">ekoai.com &nbsp;|&nbsp; Denver, CO</div>

</body>
</html>
