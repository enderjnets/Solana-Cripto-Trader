<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eko AI Automation — Front White</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 336px;
    height: 192px;
    background: #FFFFFF;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    position: relative;
    border: 0.5mm solid #E5E7EB;
  }

  /* Top blue gradient bar */
  .top-bar {
    width: 100%;
    height: 18px;
    background: linear-gradient(90deg, #0B4FD8, #1D4ED8);
    display: flex;
    align-items: center;
    padding-left: 28px; /* offset for logo overlap */
    position: relative;
  }

  .company-name-top {
    font-size: 5px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: #FFFFFF;
    text-transform: uppercase;
  }

  /* Logo cube — overlaps the top bar */
  .logo-cube {
    position: absolute;
    top: 4px;
    left: 10px;
    width: 28px;
    height: 28px;
    background: #0B4FD8;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    box-shadow: 0 2px 6px rgba(11,79,216,0.25);
  }

  .logo-k {
    color: #FFFFFF;
    font-size: 16px;
    font-weight: 800;
    line-height: 1;
    font-family: 'Inter', sans-serif;
  }

  /* Main content */
  .content {
    padding: 10px 14px 10px 14px;
    position: relative;
    height: calc(100% - 18px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .name-block {
    margin-top: 2px;
    margin-bottom: 4px;
    padding-left: 2px;
  }

  .owner-name {
    font-size: 13px;
    font-weight: 800;
    color: #0B4FD8;
    letter-spacing: 0.5px;
    line-height: 1.1;
  }

  .owner-title {
    font-size: 7.5px;
    color: #6B7280;
    font-weight: 400;
    letter-spacing: 0.8px;
    margin-top: 2px;
  }

  /* Blue separator line */
  .separator {
    width: 36px;
    height: 1px;
    background: #0B4FD8;
    margin: 6px 0;
  }

  /* Contact list */
  .contacts {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 2.5px;
  }

  .contacts li {
    font-size: 6.5px;
    color: #374151;
    font-weight: 400;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    gap: 4px;
    line-height: 1.3;
  }

  .bullet {
    color: #0B4FD8;
    font-size: 8px;
    font-weight: 900;
    flex-shrink: 0;
    line-height: 1;
  }

  /* AI 24/7 badge */
  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    margin-left: 3px;
  }

  .ai-dot {
    width: 5px;
    height: 5px;
    background: #10B981;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .ai-label {
    font-size: 5.5px;
    font-weight: 700;
    color: #10B981;
    background: rgba(16,185,129,0.08);
    border: 0.5px solid #10B981;
    border-radius: 2px;
    padding: 0.5px 3px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <!-- Top blue gradient bar -->
  <div class="top-bar">
    <span class="company-name-top">EKO AI AUTOMATION LLC</span>
  </div>

  <!-- Logo cube overlapping top bar -->
  <div class="logo-cube">
    <span class="logo-k">K</span>
  </div>

  <!-- Main content area -->
  <div class="content">

    <div>
      <div class="name-block">
        <div class="owner-name">Ender Ocando</div>
        <div class="owner-title">Founder &amp; CEO</div>
      </div>

      <div class="separator"></div>

      <ul class="contacts">
        <li>
          <span class="bullet">•</span>
          <span>+1 (720) 512-1753</span>
        </li>
        <li>
          <span class="bullet">•</span>
          <span>+1 (720) 824-9313</span>
          <span class="ai-badge">
            <span class="ai-dot"></span>
            <span class="ai-label">AI 24/7</span>
          </span>
        </li>
        <li>
          <span class="bullet">•</span>
          <span>eko@ekoai.com</span>
        </li>
        <li>
          <span class="bullet">•</span>
          <span>ekoai.com &nbsp;|&nbsp; Denver, CO</span>
        </li>
      </ul>
    </div>

  </div>

</body>
</html>
