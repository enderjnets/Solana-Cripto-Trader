<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Eko AI Automation LLC">
  <title>Eko AI Automation LLC</title>
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0B4FD8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D6FEB;stop-opacity:0.75" />
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B4FD8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A3FB8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════ -->
  <!-- ICON: Rounded square background    -->
  <!-- ═══════════════════════════════════ -->
  <rect x="0" y="0" width="80" height="80" rx="16" ry="16" fill="url(#iconBg)" />

  <!-- ═══════════════════════════════════ -->
  <!-- ICON: Letter K (geometric)         -->
  <!-- Vertical stroke of K               -->
  <!-- ═══════════════════════════════════ -->
  <!-- Vertical bar -->
  <rect x="18" y="16" width="8" height="48" rx="3" ry="3" fill="#F8FAFC" />

  <!-- Upper diagonal arm of K (top-right) -->
  <polygon points="26,40 48,16 57,16 35,40" fill="#F8FAFC" rx="2" />

  <!-- ═══════════════════════════════════ -->
  <!-- ICON: Sound waves replacing lower  -->
  <!-- arm of K — 3 concentric arcs       -->
  <!-- ═══════════════════════════════════ -->

  <!-- Wave 1 — closest, smallest -->
  <path d="M 30 44 Q 36 50 30 56"
        fill="none"
        stroke="#10B981"
        stroke-width="3.5"
        stroke-linecap="round"
        opacity="0.95" />

  <!-- Wave 2 — medium -->
  <path d="M 36 40 Q 48 50 36 60"
        fill="none"
        stroke="#10B981"
        stroke-width="3.5"
        stroke-linecap="round"
        opacity="0.7" />

  <!-- Wave 3 — largest, most transparent -->
  <path d="M 42 36 Q 60 50 42 64"
        fill="none"
        stroke="#10B981"
        stroke-width="3"
        stroke-linecap="round"
        opacity="0.4" />

  <!-- ═══════════════════════════════════ -->
  <!-- WORDMARK: "eko ai"                 -->
  <!-- Using embedded text with system    -->
  <!-- fallback for Plus Jakarta Sans     -->
  <!-- ═══════════════════════════════════ -->

  <!-- Main wordmark: "eko" -->
  <text
    x="96"
    y="50"
    font-family="'Plus Jakarta Sans', 'Nunito', 'Poppins', Arial, sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="0.5"
    fill="#0F172A">eko</text>

  <!-- Accent wordmark: " ai" in Eko Blue -->
  <text
    x="168"
    y="50"
    font-family="'Plus Jakarta Sans', 'Nunito', 'Poppins', Arial, sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="0.5"
    fill="#0B4FD8"> ai</text>

  <!-- Subtitle: "automation" -->
  <text
    x="97"
    y="66"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="2.5"
    fill="#64748B">AUTOMATION</text>

  <!-- Active dot indicator (green dot = always on) -->
  <circle cx="310" cy="16" r="5" fill="#10B981" opacity="0.9" />

</svg>
